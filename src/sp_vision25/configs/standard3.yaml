enemy_color: "red"
#enemy_color: "blue"

#####-----神经网络参数-----#####
yolo_name: yolov5
classify_model: assets/tiny_resnet.onnx
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/yolov5.xml
device: GPU
min_confidence: 0.8
use_traditional: true

#####-----ROI-----#####
roi: 
  x: 420
  y: 50
  width: 600
  height: 600

use_roi: false

#####-----传统方法参数-----#####
threshold: 150
max_angle_error: 45 # degree
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25 # degree

#####-----tracker参数-----#####
min_detect_count: 3
max_temp_lost_count: 15
outpost_max_temp_lost_count: 75

#####-----aimer参数----
yaw_offset: -2.59
pitch_offset: 1.47
comming_angle: 60
leaving_angle: 25
decision_speed: 8
high_speed_delay_time: 0.07  # 略微减少高速延迟，进一步提高响应速度 
low_speed_delay_time: 0.10  # 略微减少低速延迟

#####-----shooter参数-----#####
first_tolerance: 3 # 近距离射击容差，degree 降低容差提高精度
second_tolerance: 2 # 远距离射击容差，degree 降低容差提高精度
judge_distance: 2 #距离判断阈值
auto_fire: true # 是否由自瞄控制射击

camera_name: "hikrobot"
exposure_ms: 2.5
gain: 16.0
vid_pid: "2bdf:0001"

#  1  0  0
#  0  1  0
#  0  0  1
R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]

