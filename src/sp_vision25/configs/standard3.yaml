quaternion_canid: 0x100
bullet_speed_canid: 0x101
send_canid: 0xff
can_interface: "can0"

#####-----gimbal参数-----
com_port: "/dev/ttyACM1"
gimbal_state_unit: "deg"
# yaw_kp: 0  # 进一步增加yaw轴比例增益，提高响应速度
# yaw_kd: 0  # 进一步增加yaw轴微分增益，减少剩余震荡
# pitch_kp: 0  # 进一步增加pitch轴比例增益，原先是0.22
# pitch_kd: 0  # 进一步增加pitch轴微分增益，原先是0.15

#####-----planner-----#####
fire_thresh: 0.0027  # 当前设置为0.0035弧度（约0.2度）

max_yaw_acc: 90  # 当前设置为60度/秒² serial: SerialException device reports readiness to write but returned no data
Q_yaw: [3e6, 0.3]  # 当前位置权重为4e6，速度权重为0
R_yaw: [1.57] # 当前设置为0.7
max_pitch_acc: 75  # 当前设置为100度/秒²
Q_pitch: [7e5, 0]  # 当前位置权重为6e6，速度权重为0
R_pitch: [1.0]  # 当前设置为0.7

